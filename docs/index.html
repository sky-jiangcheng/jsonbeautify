<!DOCTYPE html>

<head>
  <script>
    (function(){
      try {
        var d = document.documentElement;
        var ua = navigator.userAgent || '';
        var pf = navigator.platform || '';
        var isMobilePlatform = /iPhone|iPad|iPod|Android/i.test(pf);
        var isMobileUA = /Mobi|Android|iPhone|iPad|iPod|Windows Phone|webOS|BlackBerry|IEMobile|Opera Mini/i.test(ua);
        var isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints && navigator.maxTouchPoints > 1);
        function detect() {
          var narrow = window.innerWidth <= 900;
          return (isMobilePlatform || isMobileUA || (isTouch && narrow) || narrow) ? 'mobile' : 'desktop';
        }
        d.setAttribute('data-device', detect());
        window.addEventListener('resize', function(){
          d.setAttribute('data-device', detect());
        });
        window.addEventListener('orientationchange', function(){
          setTimeout(function(){ d.setAttribute('data-device', detect()); }, 100);
        });
      } catch(e) {
        document.documentElement.setAttribute('data-device',
          /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent || '') ? 'mobile' : 'desktop');
      }
    })();
  </script>

    </div>

    <!-- ========== Compare View ========== -->
    <div class="compare-container" id="compare-container">
        <div class="compare-header">
            <span class="title">
                <svg class="svg-icon" viewBox="0 0 24 24" style="vertical-align:middle;margin-right:4px"><use href="#icon-diff"/></svg>
                <span data-i18n="compareTitle">JSON 对比</span>
            </span>
            <div class="actions">
                <button class="btn" onclick="reverseCompare()">
                    <svg class="svg-icon-sm" viewBox="0 0 24 24"><use href="#icon-swap"/></svg>
                    <span data-i18n="swap">交换</span>
                </button>
                <button class="btn btn-danger" onclick="closeCompare()" data-i18n="close">关闭</button>
            </div>
        </div>
            <div class="compare-body">
                <div class="compare-col" id="compare-left">
                <div class="compare-col-header" id="compare-left-title"></div>
                <div class="compare-content" id="compare-left-content"></div>
            </div>
            <div class="compare-divider"></div>
            <div class="compare-col" id="compare-right">
                <div class="compare-col-header" id="compare-right-title"></div>
                <div class="compare-content" id="compare-right-content"></div>
            </div>
        </div>
    </div>

    <!-- ========== Toast ========== -->
    <div class="toast" id="toast"></div>

    <script src="app.js"></script>

</body>
</html>
