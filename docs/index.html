    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <script>
    (function(){
      try {
        var d = document.documentElement;
        var ua = navigator.userAgent || '';
        var pf = navigator.platform || '';
        // 多重检测：platform / UA / maxTouchPoints / 触摸事件
        var isMobilePlatform = /iPhone|iPad|iPod|Android/i.test(pf);
        var isMobileUA = /Mobi|Android|iPhone|iPad|iPod|iOS|Windows Phone|webOS|BlackBerry|IEMobile|Opera Mini/i.test(ua);
        var isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints && navigator.maxTouchPoints > 1);
        var isNarrow = window.innerWidth <= 900;
        var isMobile = isMobilePlatform || isMobileUA || (isTouch && isNarrow);
        d.setAttribute('data-device', isMobile ? 'mobile' : 'desktop');
        window.addEventListener('resize', function(){
          var narrow = window.innerWidth <= 900;
          d.setAttribute('data-device',
            (isMobilePlatform || isMobileUA || (isTouch && narrow) || narrow) ? 'mobile' : 'desktop');
        });
        window.addEventListener('orientationchange', function(){
          setTimeout(function(){
            var narrow = window.innerWidth <= 900;
            d.setAttribute('data-device',
              (isMobilePlatform || isMobileUA || (isTouch && narrow) || narrow) ? 'mobile' : 'desktop');
          }, 100);
        });
      } catch(e) {
        // 兜底：出错时强制用 UA 判断，避免完全失效
        var ua2 = navigator.userAgent || '';
        document.documentElement.setAttribute('data-device',
          /Mobi|Android|iPhone|iPad|iPod|iOS/i.test(ua2) ? 'mobile' : 'desktop');
      }
    })();
  </script>

    <!-- 调试指示器：URL 加 ?debug=1 显示，用于排查移动端检测问题 -->
    <div id="mobile-debug" style="position:fixed;bottom:8px;right:8px;z-index:99999;background:rgba(0,0,0,0.85);color:#fff;font-size:10px;padding:6px 8px;border-radius:4px;font-family:monospace;line-height:1.5;display:none;pointer-events:none;white-space:pre"></div>
    <script>
      (function(){
        if(location.search.indexOf('debug=1')>-1 || location.hash.indexOf('debug=1')>-1) {
          var el = document.getElementById('mobile-debug');
          if(el) {
            el.style.display = 'block';
            var d = document.documentElement;
            var up = function(){
              el.textContent =
                'data-device: ' + d.getAttribute('data-device') +
                '\nbody.mobile: ' + document.body.classList.contains('mobile') +
                '\ninnerWidth: ' + window.innerWidth +
                '\ninnerHeight: ' + window.innerHeight +
                '\nUA: ' + (navigator.userAgent||'').substring(0,80) +
                '\nplatform: ' + (navigator.platform||'') +
                '\ntouch: ' + ('ontouchstart' in window) +
                '\nmaxTouchPoints: ' + (navigator.maxTouchPoints||0);
            };
            up();
            window.addEventListener('resize', up);
            window.addEventListener('orientationchange', function(){ setTimeout(up, 200); });
          }
        }
      })();
    </script>

            <div class="modal-actions">
                <button class="btn" onclick="closeSaveModal()" data-i18n="cancel">取消</button>
                <button class="btn btn-primary" onclick="confirmSave()" data-i18n="save">保存</button>
            </div>
        </div>
    </div>

    <!-- ========== Compare View ========== -->
    <div class="compare-container" id="compare-container">
        <div class="compare-header">
            <span class="title">
                <svg class="svg-icon" viewBox="0 0 24 24" style="vertical-align:middle;margin-right:4px"><use href="#icon-diff"/></svg>
                <span data-i18n="compareTitle">JSON 对比</span>
            </span>
            <div class="actions">
                <button class="btn" onclick="reverseCompare()">
                    <svg class="svg-icon-sm" viewBox="0 0 24 24"><use href="#icon-swap"/></svg>
                    <span data-i18n="swap">交换</span>
                </button>
                <button class="btn btn-danger" onclick="closeCompare()" data-i18n="close">关闭</button>
            </div>
        </div>
            <div class="compare-body">
                <div class="compare-col" id="compare-left">
                <div class="compare-col-header" id="compare-left-title"></div>
                <div class="compare-content" id="compare-left-content"></div>
            </div>
            <div class="compare-divider"></div>
            <div class="compare-col" id="compare-right">
                <div class="compare-col-header" id="compare-right-title"></div>
                <div class="compare-content" id="compare-right-content"></div>
            </div>
        </div>
    </div>

    <!-- ========== Toast ========== -->
    <div class="toast" id="toast"></div>

    <script src="scripts/i18n.js"></script>
    <script src="scripts/main.js"></script>
</body>
</html>
