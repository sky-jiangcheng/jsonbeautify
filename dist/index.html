<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON 格式化工具</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" id="hljs-dark">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css" id="hljs-light" disabled>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        /* ========== CSS Variables ========== */
        :root,
        [data-theme="dark"] {
            --bg-primary: #0d1117;
            --bg-secondary: #0b0f14;
            --bg-surface: #131921;
            --bg-elevated: #1a2028;
            --bg-hover: #1c2633;
            --bg-input: #0d1117;
            --border: #3a424d;
            --border-light: #2b313a;
            --border-focus: #58a6ff;
            --text-primary: #e6edf3;
            --text-secondary: #99a4af;
            --text-muted: #6e7681;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --accent-subtle: rgba(88, 166, 255, 0.1);
            --green: #3fb950;
            --green-bg: rgba(63, 185, 80, 0.1);
            --green-border: rgba(63, 185, 80, 0.25);
            --red: #f85149;
            --red-bg: rgba(248, 81, 73, 0.1);
            --red-border: rgba(248, 81, 73, 0.25);
            --yellow: #d29922;
            --yellow-bg: rgba(210, 153, 34, 0.12);
            --orange: #db6d28;
            --purple: #a371f7;
            --radius: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --font-mono: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'Consolas', 'Monaco', 'Courier New', monospace;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
            --shadow: 0 4px 12px rgba(0,0,0,0.4);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.5);
            --shadow-glow: 0 0 0 1px rgba(88, 166, 255, 0.15);
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-fast: 0.12s ease;
            color-scheme: dark;
        }

        [data-theme="light"] {
            --bg-primary: #ffffff;
            --bg-secondary: #eef1f5;
            --bg-surface: #f6f8fa;
            --bg-elevated: #ffffff;
            --bg-hover: #e1e5ea;
            --bg-input: #ffffff;
            --border: #b3bcc5;
            --border-light: #c5cdd6;
            --border-focus: #0969da;
            --text-primary: #1f2328;
            --text-secondary: #57606a;
            --text-muted: #6e7681;
            --accent: #0969da;
            --accent-hover: #0550ae;
            --accent-subtle: rgba(9, 105, 218, 0.08);
            --green: #1a7f37;
            --green-bg: rgba(26, 127, 55, 0.10);
            --green-border: rgba(26, 127, 55, 0.25);
            --red: #cf222e;
            --red-bg: rgba(207, 34, 46, 0.10);
            --red-border: rgba(207, 34, 46, 0.25);
            --yellow: #9a6700;
            --yellow-bg: rgba(154, 103, 0, 0.12);
            --orange: #bc4c00;
            --purple: #8250df;
            --shadow-sm: 0 1px 2px rgba(31,35,40,0.08);
            --shadow: 0 4px 12px rgba(31,35,40,0.10);
            --shadow-lg: 0 12px 40px rgba(31,35,40,0.12);
            --shadow-glow: 0 0 0 1px rgba(9, 105, 218, 0.10);
            color-scheme: light;
        }

        /* ========== Reset & Base ========== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ========== SVG Icon Styles ========== */
        .svg-icon {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            display: inline-block;
            vertical-align: middle;
        }
        .svg-icon-sm { width: 13px; height: 13px; }
        .svg-icon-lg { width: 20px; height: 20px; }

        /* ========== Scrollbar ========== */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
        ::-webkit-scrollbar-corner { background: transparent; }

        /* ========== Header ========== */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            height: 44px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            gap: 12px;
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            letter-spacing: -0.2px;
            user-select: none;
        }

        .logo-icon {
            width: 22px;
            height: 22px;
            color: var(--accent);
        }

        /* ========== Toolbar ========== */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .toolbar .sep {
            width: 1px;
            height: 20px;
            background: var(--border);
            margin: 0 6px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            height: 30px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg-surface);
            color: var(--text-secondary);
            font-size: 12px;
            font-family: var(--font-sans);
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
            white-space: nowrap;
            line-height: 1;
        }

        .btn:hover {
            background: var(--bg-hover);
            border-color: var(--text-muted);
            color: var(--text-primary);
        }

        .btn:active {
            background: var(--bg-elevated);
            transform: scale(0.97);
        }

        .btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none;
            color: var(--text-muted);
        }

        .btn-primary {
            background: #1f6feb;
            color: #ffffff;
            border-color: #1f6feb;
            font-weight: 600;
        }

        .btn-primary:hover {
            background: #388bfd;
            border-color: #388bfd;
            color: #ffffff;
        }

        .btn-primary:active {
            background: #1a5dcc;
        }

        .btn-danger {
            border-color: rgba(248, 81, 73, 0.2);
            color: var(--red);
        }

        .btn-danger:hover {
            background: var(--red-bg);
            border-color: rgba(248, 81, 73, 0.4);
            color: #ff7b72;
        }

        .btn .shortcut {
            font-size: 10px;
            color: var(--text-muted);
            font-family: var(--font-mono);
            padding: 1px 4px;
            background: rgba(72, 79, 88, 0.15);
            border-radius: 3px;
            letter-spacing: 0;
        }

        .btn-primary .shortcut {
            color: rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.12);
        }

        .btn .svg-icon { color: currentColor; }

        /* ========== Indent Select ========== */
        /* ========== Validation Indicator ========== */
        .validation-indicator {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            font-family: var(--font-mono);
            padding: 1px 6px;
            border-radius: 3px;
            margin-left: 4px;
        }
        .validation-indicator.valid {
            color: var(--green);
        }
        .validation-indicator.invalid {
            color: var(--red);
        }
        .validation-indicator .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
        }
        .validation-indicator.valid .dot {
            background: var(--green);
        }
        .validation-indicator.invalid .dot {
            background: var(--red);
        }

        /* ========== Main Layout ========== */
        .main-layout {
            display: flex;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        /* ========== Editor Area ========== */
        .editor-area {
            flex: 1;
            display: flex;
            min-width: 0;
        }

        .panel {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 0;
        }

        .panel-left { border-right: 2px solid var(--border); flex: 0.54; }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px;
            height: 32px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-light);
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex-shrink: 0;
            user-select: none;
        }

        .panel-header .label {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .panel-header .label .svg-icon-xs {
            width: 12px;
            height: 12px;
            opacity: 0.7;
        }

        .panel-body {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        /* ========== Input Panel ========== */
        #input-body {
            display: flex;
            flex-direction: column;
        }

        #input {
            flex: 1;
            min-height: 0;
            width: 100%;
            padding: 12px 16px;
            border: none;
            outline: none;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 13px;
            line-height: 1.65;
            resize: none;
            tab-size: 2;
            overflow: auto;
            transition: box-shadow var(--transition-fast);
        }

        #input:focus {
            box-shadow: inset 0 0 0 1px var(--border-focus);
        }

        #input::placeholder {
            color: var(--text-muted);
        }

        #input::selection {
            background: rgba(88, 166, 255, 0.25);
        }

        /* ========== Output Area ========== */
        .output-wrap {
            position: absolute;
            inset: 0;
            width: auto;
            height: auto;
            overflow: hidden;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
        }

        .output-linenos {
            flex-shrink: 0;
            padding: 12px 0;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-light);
            user-select: none;
            overflow: hidden;
            text-align: right;
            font-family: var(--font-mono);
            font-size: 13px;
            line-height: 1.65;
            color: var(--text-muted);
            min-width: 48px;
        }

        .output-linenos span {
            display: block;
            padding: 0 12px 0 8px;
        }

        .output-content {
            flex: 1;
            min-width: 0;
            min-height: 0;
            overflow: auto;
        }

        .output-content pre {
            margin: 0;
            padding: 12px 16px;
            background: transparent !important;
        }

        .output-content code {
            font-family: var(--font-mono) !important;
            font-size: 13px !important;
            line-height: 1.65 !important;
            background: transparent !important;
        }

        .output-placeholder {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 13px;
            opacity: 0.5;
            flex-direction: column;
            gap: 8px;
            user-select: none;
        }

        .output-placeholder .svg-icon {
            width: 32px;
            height: 32px;
            opacity: 0.3;
        }

        .output-error {
            padding: 12px 16px;
            color: var(--red);
            font-family: var(--font-mono);
            font-size: 12px;
            line-height: 1.6;
            border-left: 3px solid var(--red);
            margin: 8px;
            background: var(--red-bg);
            border-radius: 0 var(--radius) var(--radius) 0;
        }

        .output-warning {
            margin: 8px;
            padding: 8px 12px;
            background: var(--yellow-bg);
            border: 1px solid rgba(210, 153, 34, 0.15);
            border-left: 3px solid var(--yellow);
            border-radius: 0 var(--radius) var(--radius) 0;
            color: var(--yellow);
            font-size: 11.5px;
            font-family: var(--font-sans);
        }

        /* ========== Output Notifications ========== */
        .output-notifications {
            flex-shrink: 0;
            overflow-y: auto;
        }
        .output-notifications:empty {
            display: none;
        }
        .output-notification {
            padding: 6px 14px;
            font-size: 12px;
            line-height: 1.5;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            font-family: var(--font-sans);
        }
        .output-notification.error {
            background: var(--red-bg);
            color: var(--red);
            border-left: 3px solid var(--red);
        }
        .output-notification.warning {
            background: var(--yellow-bg);
            color: var(--yellow);
            border-left: 3px solid var(--yellow);
        }

        .error-display {
            padding: 20px 24px;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .error-display .error-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--red);
            font-family: var(--font-sans);
        }
        .error-display .error-msg {
            font-size: 13px;
            line-height: 1.7;
            color: var(--text-secondary);
            font-family: var(--font-sans);
        }
        .error-display .error-snippet {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 12px 16px;
            font-family: var(--font-mono);
            font-size: 12px;
            line-height: 1.6;
            color: var(--text-primary);
            white-space: pre-wrap;
            word-break: break-all;
        }
        .error-display .error-marker {
            color: var(--red);
            font-weight: bold;
        }
        .error-display .error-hint {
            font-size: 12px;
            color: var(--text-muted);
            font-family: var(--font-sans);
            line-height: 1.6;
        }

        .output-content-area {
            flex: 1;
            position: relative;
            display: flex;
            min-height: 0;
            min-width: 0;
            overflow: hidden;
        }

        /* ========== List View (Array) ========== */
        .list-view {
            display: flex;
            flex: 1;
            min-height: 0;
            min-width: 0;
            position: relative;
        }
        .list-panel {
            width: 240px;
            min-width: 160px;
            border-right: 1px solid var(--border);
            overflow: hidden;
            flex-shrink: 0;
            background: var(--bg-secondary);
            display: flex;
            flex-direction: column;
            transition: width var(--transition), min-width var(--transition), border-color var(--transition);
        }
        .list-panel.collapsed {
            width: 0;
            min-width: 0;
            border-right-color: transparent;
        }
        .list-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            height: 30px;
            border-bottom: 1px solid var(--border-light);
            flex-shrink: 0;
        }
        .list-panel-header .list-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .list-panel-toggle {
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 12px;
            border-radius: 4px;
            transition: all var(--transition-fast);
            flex-shrink: 0;
        }
        .list-panel-toggle:hover {
            color: var(--text-primary);
            background: var(--bg-hover);
        }
        .list-panel-body {
            flex: 1;
            overflow-y: auto;
        }
        .list-panel.collapsed .list-panel-header,
        .list-panel.collapsed .list-panel-body {
            display: none;
        }

        .list-expand-tab {
            display: none;
            flex-shrink: 0;
            width: 20px;
            cursor: pointer;
            background: var(--bg-elevated);
            align-items: center;
            justify-content: center;
            border-right: 1px solid var(--border);
        }
        .list-expand-tab:hover {
            background: var(--bg-hover);
        }
        .list-expand-tab svg {
            width: 12px;
            height: 12px;
            color: var(--text-secondary);
        }
        .list-view.list-collapsed .list-expand-tab {
            display: flex;
        }
        .list-item {
            display: flex;
            flex-direction: column;
            padding: 7px 12px;
            cursor: pointer;
            border-bottom: 1px solid rgba(48, 54, 61, 0.4);
            transition: all var(--transition-fast);
            border-left: 2px solid transparent;
            user-select: none;
        }
        .list-item:hover {
            background: var(--bg-hover);
        }
        .list-item.active {
            background: var(--accent-subtle);
            border-left-color: var(--accent);
        }
        .list-item-index {
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 2px;
        }
        .list-item-preview {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .list-detail {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            background: var(--bg-primary);
            display: flex;
        }
        .list-detail-linenos {
            flex-shrink: 0;
            padding: 12px 0;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-light);
            user-select: none;
            overflow: hidden;
            text-align: right;
            font-family: var(--font-mono);
            font-size: 13px;
            line-height: 1.65;
            color: var(--text-muted);
            min-width: 48px;
        }
        .list-detail-linenos span {
            display: block;
            padding: 0 12px 0 8px;
        }
        .list-detail-content {
            flex: 1;
            min-width: 0;
            min-height: 0;
            overflow: auto;
        }
        .list-detail-content pre {
            margin: 0;
            padding: 12px 16px;
            background: transparent !important;
        }
        .list-detail-content code {
            font-family: var(--font-mono) !important;
            font-size: 13px !important;
            line-height: 1.65 !important;
            background: transparent !important;
        }

        /* ========== JSON Tree View ========== */
        .json-tree {
            padding: 12px 16px;
            font-family: var(--font-mono);
            font-size: 13px;
            line-height: 1.65;
            white-space: nowrap;
        }
        .jt-line {
            display: block;
            min-height: 21px;
        }
        .jt-key {
            color: #79c0ff;
        }
        .jt-string {
            color: #a5d6ff;
        }
        .jt-number {
            color: #79c0ff;
        }
        .jt-bool {
            color: #ff7b72;
        }
        .jt-null {
            color: #8b949e;
            font-style: italic;
        }
        .jt-bracket {
            color: #c9d1d9;
        }
        .jt-comma {
            color: #c9d1d9;
        }
        .jt-toggle {
            display: inline-block;
            width: 16px;
            cursor: pointer;
            user-select: none;
            color: var(--text-muted);
            font-size: 10px;
            text-align: center;
            transition: transform var(--transition-fast);
        }
        .jt-toggle:hover {
            color: var(--text-primary);
        }
        .jt-children {
            padding-left: 20px;
            border-left: 1px solid rgba(48, 54, 61, 0.5);
            margin-left: 8px;
        }
        .jt-collapsed-summary {
            display: none;
            color: var(--text-muted);
            font-style: italic;
        }
        .jt-group.collapsed .jt-collapsed-summary {
            display: inline;
        }
        .jt-group.collapsed .jt-children,
        .jt-group.collapsed .jt-closing {
            display: none;
        }
        .jt-group.collapsed .jt-toggle {
            transform: none;
        }

        @media (max-width: 900px) {
            .list-panel { width: 40%; min-width: 120px; }
        }
        @media (max-width: 600px) {
            .list-panel { width: 45%; min-width: 100px; }
            .list-item { padding: 5px 8px; }
            .list-item-index, .list-item-preview { font-size: 10px; }
        }

        /* ========== Drag & Drop Overlay ========== */
        .drop-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(88, 166, 255, 0.06);
            border: 2px dashed var(--accent);
            border-radius: 0;
            z-index: 10;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: var(--accent);
            font-weight: 600;
            pointer-events: none;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            gap: 8px;
        }

        .drop-overlay.active { display: flex; }

        .drop-overlay .svg-icon {
            width: 24px;
            height: 24px;
        }

        /* ========== Sidebar ========== */
        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: width var(--transition), opacity var(--transition), border-color var(--transition);
            overflow: hidden;
        }

        .sidebar.collapsed {
            width: 0;
            border-left-color: transparent;
            opacity: 0;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px;
            height: 32px;
            border-bottom: 1px solid var(--border-light);
            flex-shrink: 0;
        }

        .sidebar-header h3 {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
        }

        .sidebar-toggle {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 12px;
            border-radius: 4px;
            transition: all var(--transition-fast);
        }

        .sidebar-toggle:hover {
            color: var(--text-primary);
            background: var(--bg-hover);
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px;
        }

        .history-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 16px;
            color: var(--text-muted);
            text-align: center;
            font-size: 12px;
            gap: 8px;
            height: 100%;
        }

        .history-empty .svg-icon {
            width: 28px;
            height: 28px;
            opacity: 0.3;
        }

        .history-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all var(--transition-fast);
            margin-bottom: 2px;
            border: 1px solid transparent;
        }

        .history-item:hover {
            background: var(--bg-hover);
        }

        .history-item.selected {
            background: var(--accent-subtle);
            border-color: rgba(88, 166, 255, 0.25);
        }

        .history-checkbox {
            accent-color: var(--accent);
            width: 14px;
            height: 14px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .history-info {
            flex: 1;
            min-width: 0;
        }

        .history-name {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-snippet {
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
            font-family: var(--font-mono);
        }

        .history-delete {
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            border-radius: 3px;
            opacity: 0;
            transition: all var(--transition-fast);
            flex-shrink: 0;
        }

        .history-item:hover .history-delete { opacity: 1; }
        .history-delete:hover { color: var(--red); background: var(--red-bg); }

        .sidebar-footer {
            padding: 8px;
            border-top: 1px solid var(--border-light);
            flex-shrink: 0;
        }

        .compare-actions {
            display: flex;
            gap: 6px;
        }

        .compare-actions .btn { flex: 1; justify-content: center; font-size: 11px; padding: 4px 8px; height: 28px; }

        /* ========== Modal ========== */
        .modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(1, 4, 9, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            animation: fade-in 0.15s ease;
        }

        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

        .modal-backdrop.active { display: flex; }

        .modal {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            width: 360px;
            box-shadow: var(--shadow-lg), var(--shadow-glow);
            animation: modal-slide-up 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes modal-slide-up {
            from { transform: translateY(16px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal h3 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-primary);
            letter-spacing: -0.2px;
        }

        .modal input[type="text"] {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 13px;
            font-family: var(--font-sans);
            outline: none;
            transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
        }

        .modal input[type="text"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-subtle);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 18px;
        }

        .modal-actions .btn { height: 32px; padding: 6px 14px; }

        /* ========== Compare View ========== */
        .compare-container {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            z-index: 900;
            display: none;
            flex-direction: column;
            animation: fade-in 0.15s ease;
        }

        .compare-container.active { display: flex; }

        .compare-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            height: 44px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .compare-header .title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.2px;
        }

        .compare-header .actions {
            display: flex;
            gap: 6px;
        }

        .compare-body {
            flex: 1;
            display: flex;
            position: relative;
            min-height: 0;
        }

        .compare-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            overflow: hidden;
        }

        .compare-col-header {
            padding: 0 14px;
            height: 30px;
            display: flex;
            align-items: center;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-light);
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
            flex-shrink: 0;
        }

        .compare-content {
            flex: 1;
            overflow: auto;
            font-family: var(--font-mono);
            font-size: 13px;
            line-height: 1.65;
        }

        .compare-divider {
            width: 1px;
            background: var(--border);
            flex-shrink: 0;
        }

        /* Diff tree highlight styles */
        .jt-diff-added > .jt-line:first-child,
        .jt-diff-added > .jt-line.jt-closing,
        .jt-diff-added.jt-line {
            background: rgba(63, 185, 80, 0.12);
        }
        .jt-diff-removed > .jt-line:first-child,
        .jt-diff-removed > .jt-line.jt-closing,
        .jt-diff-removed.jt-line {
            background: rgba(248, 81, 73, 0.12);
        }
        .jt-diff-changed > .jt-line:first-child,
        .jt-diff-changed > .jt-line.jt-closing,
        .jt-diff-changed.jt-line {
            background: rgba(210, 153, 34, 0.12);
        }
        .jt-diff-removed > .jt-line:first-child,
        .jt-diff-removed.jt-line {
            background: rgba(248, 81, 73, 0.12);
        }
        .jt-diff-changed > .jt-line:first-child,
        .jt-diff-changed.jt-line {
            background: rgba(210, 153, 34, 0.12);
        }
        .jt-diff-placeholder {
            color: var(--text-muted);
            font-style: italic;
        }
        .diff-empty {
            opacity: 0.35;
        }

        /* ========== Toast ========== */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-elevated);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 8px 18px;
            font-size: 12.5px;
            box-shadow: var(--shadow-lg);
            z-index: 2000;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            pointer-events: none;
            opacity: 0;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast .svg-icon-sm { flex-shrink: 0; }

        /* ========== Status Bar ========== */
        .statusbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px;
            height: 24px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-muted);
            flex-shrink: 0;
            user-select: none;
        }

        .statusbar-left, .statusbar-right {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .statusbar-left { font-family: var(--font-mono); }

        /* ========== Sidebar Toggle Buttons ========== */
        #sidebar-open-btn {
            transition: all var(--transition);
        }

        #sidebar-open-btn:hover {
            background: var(--bg-hover) !important;
            color: var(--text-primary) !important;
        }

        /* ========== Responsive ========== */
        @media (max-width: 900px) {
            .editor-area { flex-direction: column; }
            .panel-left { border-right: none; border-bottom: 2px solid var(--border); }
            .sidebar {
                width: 100%;
                border-left: none;
                border-top: 1px solid var(--border);
                max-height: 260px;
            }
            .sidebar.collapsed { max-height: 0; }
            .btn .shortcut { display: none; }
            .btn { padding: 4px 8px; font-size: 11px; }
            header { padding: 0 12px; }
        }

        @media (max-width: 600px) {
            header { flex-wrap: wrap; height: auto; padding: 8px 10px; gap: 8px; }
            .toolbar { width: 100%; justify-content: center; }
            .logo { font-size: 12px; }
        }
    </style>
