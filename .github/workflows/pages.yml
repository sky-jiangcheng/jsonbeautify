name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build
        run: |
          rm -rf dist
          mkdir -p dist/styles dist/scripts dist/icons
          sed 's|\.\./||g' src/index.html > dist/index.html
          cp src/styles/*.css dist/styles/
          cp src/scripts/*.js dist/scripts/
          for f in highlight.min.js highlight-atom-one-dark.min.css highlight-atom-one-light.min.css manifest.json sw.js icon.svg favicon-32.png icon-192.png icon-512.png; do
            [ -f "$f" ] && cp "$f" dist/ || echo "  SKIP $f (not found)"
          done
          if [ -d icons ] && ls icons/*.png >/dev/null 2>&1; then
            cp icons/*.png dist/icons/
          fi
          touch dist/.nojekyll
          # Must exist or fail
          test -f dist/index.html || { echo "ERROR: dist/index.html missing!"; exit 1; }
          test -f dist/styles/main.css || { echo "ERROR: dist/styles/main.css missing!"; exit 1; }
          test -f dist/scripts/main.js || { echo "ERROR: dist/scripts/main.js missing!"; exit 1; }
          test -f dist/highlight.min.js || { echo "ERROR: dist/highlight.min.js missing!"; exit 1; }
          echo "=== dist/ OK ===" && ls -laR dist/ 2>&1 | head -40

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
