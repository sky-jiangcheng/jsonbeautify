name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v4

      - name: Build
        run: |
          rm -rf dist
          mkdir -p dist/styles dist/scripts dist/icons
          sed 's|\.\./||g' src/index.html > dist/index.html
          cp src/styles/*.css dist/styles/
          cp src/scripts/*.js dist/scripts/
          for f in highlight.min.js highlight-atom-one-dark.min.css highlight-atom-one-light.min.css manifest.json sw.js icon.svg favicon-32.png icon-192.png icon-512.png; do
            [ -f "$f" ] && cp "$f" dist/ || echo "  SKIP $f"
          done
          [ -d icons ] && ls icons/*.png >/dev/null 2>&1 && cp icons/*.png dist/icons/
          touch dist/.nojekyll
          test -f dist/index.html || exit 1
          echo "Build OK"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
