name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build to docs/
        run: |
          rm -rf docs
          mkdir -p docs/icons
          sed 's|\.\./||g' src/index.html > docs/index.html
          for f in highlight.min.js highlight-atom-one-dark.min.css highlight-atom-one-light.min.css manifest.json icon.svg favicon-32.png icon-192.png icon-512.png sw.js; do
            [ -f "$f" ] && cp "$f" docs/ || echo "  SKIP $f"
          done
          [ -d icons ] && ls icons/*.png >/dev/null 2>&1 && cp icons/*.png docs/icons/
          touch docs/.nojekyll
          test -f docs/index.html || exit 1
          echo "Build OK"

      - name: Commit and push docs/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ -f
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "deploy: update docs/ from src/"
          git push
