name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          set -e
          rm -rf dist
          mkdir -p dist/styles dist/scripts dist/icons
          # Copy HTML and fix paths (../ → flat)
          sed 's|\.\./||g' src/index.html > dist/index.html
          # Copy source files
          cp -r src/styles/* dist/styles/
          cp -r src/scripts/* dist/scripts/
          # Copy static assets
          for f in highlight.min.js highlight-atom-one-dark.min.css highlight-atom-one-light.min.css manifest.json sw.js icon.svg favicon-32.png icon-192.png icon-512.png; do
            [ -f "$f" ] && cp "$f" dist/
          done
          # Copy icons directory
          [ -d icons ] && cp -r icons/* dist/icons/
          # Create .nojekyll
          touch dist/.nojekyll
          # Verify
          echo "=== dist/ contents ===" && ls -la dist/ && echo "=== index.html head ===" && head -5 dist/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
