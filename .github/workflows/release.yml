name: Release Build

on:
  push:
    tags:
      - 'v*'
    branches:
      - appstore
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libglib2.0-dev

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Check for CDN references
        run: npm run check:cdn

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "${{ github.ref_name }}"
          releaseBody: "见 CHANGELOG"
          releaseDraft: false
          prerelease: false
          args: --bundles deb,rpm,appimage

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust targets
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Check for CDN references
        run: npm run check:cdn

      - name: Generate macOS icons
        run: npx tauri icon src-tauri/icons/icon.png

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin --bundles dmg,app

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Check for CDN references
        run: npm run check:cdn

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: --bundles nsis

  macos-appstore:
    if: github.ref_name == 'appstore' || startsWith(github.ref, 'refs/tags/')
    runs-on: macos-latest
    environment:
      name: appstore
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
      APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
      APPLE_INSTALLER_CERTIFICATE: ${{ secrets.APPLE_INSTALLER_CERTIFICATE }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust targets
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Check for CDN references
        run: npm run check:cdn

      - name: Generate macOS icons
        run: npx tauri icon src-tauri/icons/icon.png

      - name: Import Apple certificate
        if: env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          # 创建构建用 keychain
          security create-keychain -p "$APPLE_KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" build.keychain
          # 导入证书到 build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$APPLE_KEYCHAIN_PASSWORD" build.keychain
          # 同时导入到 login.keychain（Xcode 默认会搜）
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" login.keychain 2>/dev/null || true
          security import certificate.p12 -k login.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security 2>/dev/null || true
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$APPLE_KEYCHAIN_PASSWORD" login.keychain 2>/dev/null || true
          # 设置 keychain 搜索路径
          security list-keychains -d user -s build.keychain login.keychain
          security default-keychain -s build.keychain
          # 验证并自动检测签名身份
          echo "=== All signing identities (all keychains) ==="
          security find-identity -v -p codesigning
          echo "=== Login keychain identities ==="
          security find-identity -v -p codesigning login.keychain 2>/dev/null || echo "(login.keychain not found)"
          echo "=== Build keychain identities ==="
          security find-identity -v -p codesigning build.keychain
          SIGNING_ID=$(security find-identity -v -p codesigning | grep -o '"[^"]*"' | head -1 | tr -d '"')
          echo "Detected signing identity: $SIGNING_ID"
          echo "APPLE_SIGNING_IDENTITY=$SIGNING_ID" >> $GITHUB_ENV
          # 输出证书完整信息（类型、颁发者、有效期）
          echo "=== Certificate full details ==="
          CERT_PEM=$(security find-certificate -a -p build.keychain)
          if [ -n "$CERT_PEM" ]; then
            echo "$CERT_PEM" | openssl x509 -noout -text 2>/dev/null | head -30
          else
            echo "(no cert found in build.keychain)"
          fi

      - name: Install provisioning profile
        if: env.PROVISIONING_PROFILE != ''
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/appstore.provisionprofile
          echo "$PROVISIONING_PROFILE" | base64 --decode > src-tauri/embedded.provisionprofile

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "${{ github.ref_name }} (App Store)"
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin --config src-tauri/tauri.appstore.conf.json

      - name: Import Apple Installer certificate
        if: env.APPLE_INSTALLER_CERTIFICATE != ''
        env:
          APPLE_INSTALLER_CERTIFICATE: ${{ secrets.APPLE_INSTALLER_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_INSTALLER_CERTIFICATE" | base64 --decode > installer-cert.p12
          # 导入 Installer 证书到 build.keychain 和 login.keychain（productbuild 默认搜 login.keychain）
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" build.keychain 2>/dev/null || true
          security import installer-cert.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/productbuild 2>/dev/null || true
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" login.keychain 2>/dev/null || true
          security import installer-cert.p12 -k login.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/productbuild 2>/dev/null || true
          security set-key-partition-list -S apple-tool:,apple:,codesign:,productbuild: -s -k "$APPLE_KEYCHAIN_PASSWORD" login.keychain 2>/dev/null || true
          security set-key-partition-list -S apple-tool:,apple:,codesign:,productbuild: -s -k "$APPLE_KEYCHAIN_PASSWORD" build.keychain 2>/dev/null || true
          # 检测 installer 签名身份
          echo "=== Installer identities ==="
          security find-identity -v -p codesigning | grep -i installer || true
          INSTALLER_ID=$(security find-identity -v -p codesigning | grep -i "3rd Party Mac Developer Installer" | grep -o '"[^"]*"' | head -1 | tr -d '"')
          if [ -z "$INSTALLER_ID" ]; then
            # 兜底：取任意 installer 身份
            INSTALLER_ID=$(security find-identity -v -p codesigning | grep -i installer | grep -o '"[^"]*"' | head -1 | tr -d '"')
          fi
          echo "Detected installer identity: $INSTALLER_ID"
          echo "APPLE_INSTALLER_IDENTITY=$INSTALLER_ID" >> $GITHUB_ENV

      - name: Build and sign PKG
        if: env.APPLE_INSTALLER_CERTIFICATE != ''
        run: |
          # 找到 .app bundle（tauri 输出在 target/universal-apple-darwin/release/bundle/macos/）
          APP=$(find src-tauri/target -name "*.app" -type d -path "*universal-apple-darwin*" | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: No .app bundle found"
            exit 1
          fi
          echo "App bundle: $APP"

          # 用 productbuild 把 .app 打包成 .pkg 并用 Installer 证书签名
          PKG_DIR="src-tauri/target/universal-apple-darwin/release/bundle/pkg"
          mkdir -p "$PKG_DIR"
          PKG="$PKG_DIR/$(basename "$APP" .app).pkg"

          productbuild \
            --component "$APP" /Applications \
            --sign "$APPLE_INSTALLER_IDENTITY" \
            "$PKG"

          echo "=== Generated PKG ==="
          ls -lh "$PKG"
          echo "PKG_PATH=$PKG" >> $GITHUB_ENV

      - name: Upload PKG to App Store Connect
        if: env.APP_STORE_CONNECT_API_KEY != '' && env.APPLE_INSTALLER_CERTIFICATE != ''
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          # 写入 API Key
          mkdir -p ~/private_keys
          echo "$APP_STORE_CONNECT_API_KEY" | base64 --decode > ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

          PKG="${PKG_PATH}"
          if [ -z "$PKG" ] || [ ! -f "$PKG" ]; then
            PKG=$(find src-tauri/target -name "*.pkg" -type f -path "*universal-apple-darwin*" | head -1)
          fi
          if [ -z "$PKG" ]; then
            echo "ERROR: No PKG found"
            exit 1
          fi
          echo "Uploading PKG: $PKG"

          xcrun altool --upload-app \
            -f "$PKG" \
            --type mac \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --verbose

          echo "✓ PKG uploaded to App Store Connect"

      - name: Submit for review
        if: env.APP_STORE_CONNECT_API_KEY != '' && env.APPLE_INSTALLER_CERTIFICATE != ''
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_APP_ID: ${{ secrets.APP_STORE_CONNECT_APP_ID_MAC }}
          APP_VERSION: ${{ github.ref_name }}
          MAX_WAIT_MINUTES: "25"
        run: |
          # 写入 API Key 并设置路径供 Python 脚本使用
          mkdir -p ~/private_keys
          KEY_PATH="$HOME/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          echo "$APP_STORE_CONNECT_API_KEY" | base64 --decode > "$KEY_PATH"
          export APP_STORE_CONNECT_KEY_PATH="$KEY_PATH"

          # 清理版本号前缀 (v1.4.0 -> 1.4.0)
          CLEAN_VERSION="${APP_VERSION#v}"
          APP_VERSION="$CLEAN_VERSION" python3 scripts/submit-appstore-review.py MAC_OS

  ios:
    if: github.ref_name == 'appstore' || startsWith(github.ref, 'refs/tags/')
    runs-on: macos-latest
    environment:
      name: appstore
    env:
      IOS_APPLE_CERTIFICATE: ${{ secrets.IOS_APPLE_CERTIFICATE }}
      IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
      APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust targets
        run: rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Check for CDN references
        run: npm run check:cdn

      - name: Import Apple certificate (iOS)
        if: env.IOS_APPLE_CERTIFICATE != '' || env.APPLE_CERTIFICATE != ''
        env:
          IOS_APPLE_CERTIFICATE: ${{ secrets.IOS_APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          # 优先使用 iOS 专用证书，否则回退到环境中的通用证书
          CERT_BASE64="${IOS_APPLE_CERTIFICATE:-$APPLE_CERTIFICATE}"
          echo "$CERT_BASE64" | base64 --decode > certificate.p12
          # 创建构建用 keychain
          security create-keychain -p "$APPLE_KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" build.keychain
          # 导入证书到 build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$APPLE_KEYCHAIN_PASSWORD" build.keychain
          # 同时导入到 login.keychain（Xcode 默认会搜）
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" login.keychain 2>/dev/null || true
          security import certificate.p12 -k login.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security 2>/dev/null || true
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$APPLE_KEYCHAIN_PASSWORD" login.keychain 2>/dev/null || true
          # 设置 keychain 搜索路径
          security list-keychains -d user -s build.keychain login.keychain
          security default-keychain -s build.keychain
          # 验证并自动检测签名身份
          echo "=== All signing identities (all keychains) ==="
          security find-identity -v -p codesigning
          echo "=== Login keychain identities ==="
          security find-identity -v -p codesigning login.keychain 2>/dev/null || echo "(login.keychain not found)"
          echo "=== Build keychain identities ==="
          security find-identity -v -p codesigning build.keychain
          SIGNING_ID=$(security find-identity -v -p codesigning | grep -o '"[^"]*"' | head -1 | tr -d '"')
          echo "Detected signing identity: $SIGNING_ID"
          echo "APPLE_SIGNING_IDENTITY=$SIGNING_ID" >> $GITHUB_ENV
          # 输出证书完整信息（类型、颁发者、有效期）
          echo "=== Certificate full details ==="
          CERT_PEM=$(security find-certificate -a -p build.keychain)
          if [ -n "$CERT_PEM" ]; then
            echo "$CERT_PEM" | openssl x509 -noout -text 2>/dev/null | head -30
          else
            echo "(no cert found in build.keychain)"
          fi
          echo "=== Login keychain certs ==="
          CERT_PEM2=$(security find-certificate -a -p login.keychain 2>/dev/null)
          if [ -n "$CERT_PEM2" ]; then
            echo "$CERT_PEM2" | openssl x509 -noout -subject -issuer 2>/dev/null
          else
            echo "(no cert found in login.keychain)"
          fi

      - name: Install iOS provisioning profile
        if: env.IOS_PROVISIONING_PROFILE != ''
        env:
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROVISIONING_PROFILE" | base64 --decode > ios-profile.mobileprovision
          # 提取 profile 的 UUID 和 Name
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin 2>/dev/null <<< $(security cms -D -i ios-profile.mobileprovision 2>/dev/null))
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /dev/stdin 2>/dev/null <<< $(security cms -D -i ios-profile.mobileprovision 2>/dev/null))
          echo "Profile UUID: $PROFILE_UUID"
          echo "Profile Name: $PROFILE_NAME"
          # 用 UUID 命名保存
          cp ios-profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision
          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV
          echo "PROFILE_NAME=$PROFILE_NAME" >> $GITHUB_ENV

      - name: Initialize iOS project
        run: npx tauri ios init --ci --config src-tauri/tauri.ios.conf.json

      - name: Configure iOS signing
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          PBXPROJ="src-tauri/gen/apple/json-formatter.xcodeproj/project.pbxproj"
          # 输出当前签名配置用于调试
          echo "=== Before ==="
          grep -E "(DEVELOPMENT_TEAM|CODE_SIGN_STYLE|PROVISIONING_PROFILE|CODE_SIGN_IDENTITY|PRODUCT_BUNDLE_IDENTIFIER)" "$PBXPROJ" | head -20

          # 用 Python 批量修改所有 buildSettings 块
          python3 << 'PYEOF'
          import re
          import os

          team_id = os.environ.get("APPLE_TEAM_ID", "")
          profile_name = os.environ.get("PROFILE_NAME", "")
          profile_uuid = os.environ.get("PROFILE_UUID", "")
          pbxproj_path = "src-tauri/gen/apple/json-formatter.xcodeproj/project.pbxproj"

          with open(pbxproj_path, "r") as f:
              content = f.read()

          # 找到所有 buildSettings = { ... } 块，在里面插入/替换签名配置
          def find_matching_brace(text, start):
              """找到与 start 处 { 匹配的 }; 位置"""
              depth = 1
              pos = start
              while depth > 0 and pos < len(text):
                  if text[pos] == '{':
                      depth += 1
                  elif text[pos] == '}':
                      depth -= 1
                  pos += 1
              if pos < len(text) and text[pos] == ';':
                  pos += 1
              return pos

          # 替换 buildSettings 块
          result = []
          i = 0
          prefix = 'buildSettings = {'
          while i < len(content):
              idx = content.find(prefix, i)
              if idx == -1:
                  result.append(content[i:])
                  break
              result.append(content[i:idx])
              end = find_matching_brace(content, idx + len(prefix))
              block = content[idx:end]

              # 修改 block 内的签名设置
              settings_to_add = {
                  "DEVELOPMENT_TEAM": f'"{team_id}"',
                  "CODE_SIGN_STYLE": "Manual",
                  "CODE_SIGN_IDENTITY": '"iPhone Distribution"',
              }
              if profile_name:
                  settings_to_add["PROVISIONING_PROFILE_SPECIFIER"] = f'"{profile_name}"'
              if profile_uuid:
                  settings_to_add["PROVISIONING_PROFILE"] = f'"{profile_uuid}"'

              for key, value in settings_to_add.items():
                  # 如果已存在则替换
                  p = re.compile(rf'(\t*){key}\s*=\s*[^;]+;')
                  if p.search(block):
                      block = p.sub(rf'\1{key} = {value};', block)
                  else:
                      # 在 buildSettings = { 后面插入
                      block = block.replace(
                          "buildSettings = {",
                          f"buildSettings = {{\n\t\t\t\t{key} = {value};",
                          1
                      )
              result.append(block)
              i = end

          content = ''.join(result)

          with open(pbxproj_path, "w") as f:
              f.write(content)

          print("Done")
          PYEOF

          echo ""
          echo "=== After ==="
          grep -E "(DEVELOPMENT_TEAM|CODE_SIGN_STYLE|PROVISIONING_PROFILE|CODE_SIGN_IDENTITY|PRODUCT_BUNDLE_IDENTIFIER)" "$PBXPROJ" | head -30

      - name: Create export options plist
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          mkdir -p src-tauri/gen/apple/export
          cat > src-tauri/gen/apple/export/exportOptions.plist << PLISTEOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>${APPLE_TEAM_ID}</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.jsonbeautify.desktop.appstore</key>
                  <string>${PROFILE_NAME}</string>
              </dict>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>iPhone Distribution</string>
          </dict>
          </plist>
          PLISTEOF
          echo "=== exportOptions.plist ==="
          cat src-tauri/gen/apple/export/exportOptions.plist

      - name: Build iOS archive
        run: |
          npx tauri ios build \
            --target aarch64 \
            --config src-tauri/tauri.ios.conf.json \
            --ci \
            --archive-only

      - name: Export IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ARCHIVE=$(find src-tauri/gen/apple/build -name "*.xcarchive" -type d | head -1)
          echo "Archive: $ARCHIVE"
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE" \
            -exportPath src-tauri/gen/apple/build \
            -exportOptionsPlist src-tauri/gen/apple/export/exportOptions.plist \
            -allowProvisioningUpdates

          echo "=== Generated IPA ==="
          find src-tauri/gen/apple/build -name "*.ipa" -type f 2>/dev/null

      - name: Upload IPA to App Store Connect
        if: env.APP_STORE_CONNECT_API_KEY != ''
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          # 写入 API Key
          mkdir -p ~/private_keys
          echo "$APP_STORE_CONNECT_API_KEY" | base64 --decode > ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

          IPA=$(find src-tauri/gen/apple/build -name "*.ipa" -type f | head -1)
          if [ -z "$IPA" ]; then
            echo "ERROR: No IPA found"
            exit 1
          fi
          echo "Uploading IPA: $IPA"

          xcrun altool --upload-app \
            -f "$IPA" \
            --type ios \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --verbose

          echo "✓ IPA uploaded to App Store Connect"

      - name: Submit for review
        if: env.APP_STORE_CONNECT_API_KEY != ''
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_APP_ID: ${{ secrets.APP_STORE_CONNECT_APP_ID_IOS }}
          APP_VERSION: ${{ github.ref_name }}
          MAX_WAIT_MINUTES: "25"
        run: |
          # 写入 API Key 并设置路径供 Python 脚本使用
          mkdir -p ~/private_keys
          KEY_PATH="$HOME/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          echo "$APP_STORE_CONNECT_API_KEY" | base64 --decode > "$KEY_PATH"
          export APP_STORE_CONNECT_KEY_PATH="$KEY_PATH"

          # 清理版本号前缀 (v1.4.0 -> 1.4.0)
          CLEAN_VERSION="${APP_VERSION#v}"
          APP_VERSION="$CLEAN_VERSION" python3 scripts/submit-appstore-review.py IOS
